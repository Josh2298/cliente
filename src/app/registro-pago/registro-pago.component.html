<h2 mat-dialog-title>Registrar Pago</h2>
<form [formGroup]="form">
    <mat-form-field>
  <mat-label>Tipo de Plan</mat-label>
  <mat-select formControlName="tipo">
    <mat-option value="sesion">Sesión</mat-option>
    <mat-option value="zumba">Zumba</mat-option>
    <mat-option value="mensual">Mensualidad</mat-option>
    <mat-option value="medio_mes">Medio Mes</mat-option>
  </mat-select>
</mat-form-field>
</form>
<input matInput type="number" formControlName="p_efectivo">
<input matInput type="number" formControlName="p_qr">
<textarea matInput formControlName="detalle"></textarea>
<button mat-button (click)="dialogRef.close()">Cancelar</button>
<button mat-button color="primary" (click)="guardar()">Guardar</button>
